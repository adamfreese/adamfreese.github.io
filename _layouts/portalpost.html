<!DOCTYPE HTML>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta http-equiv="Content-Language" content="en">
  <!-- TODO -->
  <link rel="icon" href="{{site.baseurl}}/assets/style/icon.png">
  <link rel="stylesheet" href="{{ site.baseurl }}/assets/style/sakura.css">
  <title>Anomalous Dimension: {{ page.title }}</title>
  <script id="MathJax-script" async
    src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js">
  </script>
</head>

<body>
  <div class="wrapper">
    {% include navbar.html %}
    <div class="content">
      <h1>{{ page.title }}</h1>
      Portals to page sections:
      <ul class="outline">
      <!-- Generate a list of portals to page sections -->
      {% for section in page.sections %}
        <li><a href="#{{ section.anchor }}">{{ section.title }}</a></li>
      {% endfor %}
      </ul>
      <!-- Content -->
      {{content}}
    </div>
  </div>
  <br/>
  <div class="foot">
    Content copyright 2026 Adam Freese, all rights reserved
  </div>
</body>
</html>
